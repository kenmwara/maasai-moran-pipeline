    x: W/2 + sx*W*0.30*r + Math.cos(a)*H*0.22*r*(sx===0?0.3:1)*0.55,
    y: H/2 + Math.sin(a)*H*0.36*r,
    vx:0, vy:0, phase: Math.random()*Math.PI*2, pin:false}; });
const byId = Object.fromEntries(nodes.map(n=>[n.id,n]));
const links = DATA.links.map(l=>({s:byId[l.s], t:byId[l.t], w:l.w, flow:l.flow})).filter(l=>l.s&&l.t);
const neigh = {}; links.forEach(l=>{ (neigh[l.s.id]??=[]).push(l.t); (neigh[l.t.id]??=[]).push(l.s); });

// starfield
const stars = Array.from({length:140},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.1+0.2,tw:Math.random()*Math.PI*2}));
// flow particles along flow-links
const flows = []; links.forEach(l=>{ if(l.flow) for(let k=0;k<3;k++) flows.push({l, t:Math.random()}); });

// ---- camera ----
let cam = {x:0, y:0, z:1};
const toWorld = (px,py)=>({x:(px-W/2)/cam.z + W/2 - cam.x, y:(py-H/2)/cam.z + H/2 - cam.y});

// ---- physics ----
function step(dt){
  const t = performance.now()/1000;
  // idle drift + repulsion + springs + soft centering
  for (let i=0;i<nodes.length;i++){
    const a = nodes[i];
    if (!a.pin){ a.vx += Math.cos(t*0.5 + a.phase)*0.6*dt; a.vy += Math.sin(t*0.43 + a.phase)*0.6*dt; }
    for (let j=i+1;j<nodes.length;j++){
      const b = nodes[j];
      let dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy;
      if (d2 < 1) d2 = 1;
      if (d2 < 520*520){ const f = 11000/d2; const d = Math.sqrt(d2);
        dx/=d; dy/=d; a.vx += dx*f*dt; a.vy += dy*f*dt; b.vx -= dx*f*dt; b.vy -= dy*f*dt; }
    }
  }
  for (const l of links){
    const dx = l.t.x-l.s.x, dy = l.t.y-l.s.y, d = Math.hypot(dx,dy)||1;
    const rest = 170 + (l.s.size+l.t.size)*3.4;
    const f = (d-rest)*0.02*l.w;
    const ux = dx/d, uy = dy/d;
    l.s.vx += ux*f; l.s.vy += uy*f; l.t.vx -= ux*f; l.t.vy -= uy*f;
  }
  for (const n of nodes){
    n.vx += (W/2-n.x)*0.00025; n.vy += (H/2-n.y)*0.0004;
    if (!n.pin){ n.x += n.vx*dt*32; n.y += n.vy*dt*32; }
    n.vx *= 0.86; n.vy *= 0.86;
  }
}

// ---- render ----
function draw(){
  const t = performance.now()/1000;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle = "#05060e"; ctx.fillRect(0,0,W,H);
  // vignette
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
  vg.addColorStop(0,"rgba(24,26,58,0.25)"); vg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
  for (const s of stars){ ctx.globalAlpha = 0.25 + 0.25*Math.sin(t*1.3+s.tw);
    ctx.fillStyle="#8ea0ff"; ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, 7); ctx.fill(); }
  ctx.globalAlpha = 1;

  // camera
  ctx.translate(W/2*DPR? 0:0,0);
  ctx.setTransform(DPR*cam.z, 0, 0, DPR*cam.z,
                   DPR*((W/2)*(1-cam.z) + cam.x*cam.z), DPR*((H/2)*(1-cam.z) + cam.y*cam.z));

  // links
  for (const l of links){
    const g = ctx.createLinearGradient(l.s.x,l.s.y,l.t.x,l.t.y);
    g.addColorStop(0, COLORS[l.s.type]+"55"); g.addColorStop(1, COLORS[l.t.type]+"55");
    ctx.strokeStyle = g; ctx.lineWidth = 0.6 + l.w*0.8;
    ctx.beginPath(); ctx.moveTo(l.s.x,l.s.y); ctx.lineTo(l.t.x,l.t.y); ctx.stroke();
  }
  // flow particles
  for (const f of flows){
    f.t = (f.t + 0.004*(1+f.l.w*0.4)) % 1;
    const x = f.l.s.x + (f.l.t.x-f.l.s.x)*f.t, y = f.l.s.y + (f.l.t.y-f.l.s.y)*f.t;
    ctx.fillStyle = "#ffffff"; ctx.shadowColor = COLORS[f.l.t.type]; ctx.shadowBlur = 12;
    ctx.globalAlpha = 0.9; ctx.beginPath(); ctx.arc(x,y,1.7,0,7); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  // nodes
  for (const n of nodes){
    const c = COLORS[n.type], pulse = 1 + 0.06*Math.sin(t*2 + n.phase);
    const R = n.size * pulse * (n.type==="create" ? (1+0.08*Math.sin(t*3)) : 1);
    const halo = ctx.createRadialGradient(n.x,n.y,R*0.2,n.x,n.y,R*3.2);
    halo.addColorStop(0, c+"38"); halo.addColorStop(1, c+"00");
    ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(n.x,n.y,R*3.2,0,7); ctx.fill();
    ctx.shadowColor = c; ctx.shadowBlur = 18;
    const core = ctx.createRadialGradient(n.x-R*0.3,n.y-R*0.3,R*0.1,n.x,n.y,R);
    core.addColorStop(0,"#ffffff"); core.addColorStop(0.25,c); core.addColorStop(1,c+"cc");
    ctx.fillStyle = core; ctx.beginPath(); ctx.arc(n.x,n.y,R,0,7); ctx.fill();
    ctx.shadowBlur = 0;
    if (n.size >= 11 && n.type!=="video" || n.type==="fingerprint" || n.type==="create" || n.type==="identity"){
      ctx.fillStyle = "rgba(230,235,255,0.92)";
      ctx.font = `${n.type==="fingerprint"||n.type==="create"?700:400} ${Math.max(9, Math.min(13, n.size*0.8))}px Segoe UI`;
      ctx.textAlign = "center";
      ctx.fillText(n.label, n.x, n.y + R + 14);
    }
  }
  document.getElementById("stats").textContent =
    `${DATA.meta.videos} sources · ${DATA.meta.patterns} patterns · ${DATA.meta.identities} identities · ${DATA.meta.ideas} ideas`;
}

// ---- interaction ----
let drag = null, panning = false, last = null;
const tip = document.getElementById("tip");
function pick(px,py){ const w = toWorld(px,py);
  for (let i=nodes.length-1;i>=0;i--){ const n = nodes[i];
    if (Math.hypot(n.x-w.x, n.y-w.y) < Math.max(n.size,10)+4) return n; } return null; }
cv.addEventListener("pointerdown", e=>{ const n = pick(e.clientX,e.clientY);
  if (n){ drag = n; n.pin = true; cv.classList.add("dragging"); }
  else { panning = true; last = {x:e.clientX, y:e.clientY}; cv.classList.add("dragging"); }
  cv.setPointerCapture(e.pointerId); });
cv.addEventListener("pointermove", e=>{
  if (drag){ const w = toWorld(e.clientX,e.clientY);
    // springy: the dragged node chases the cursor hard; springs haul the neighbours along
    drag.vx += (w.x-drag.x)*0.35; drag.vy += (w.y-drag.y)*0.35;
    drag.x += (w.x-drag.x)*0.55;  drag.y += (w.y-drag.y)*0.55; }
  else if (panning && last){ cam.x += (e.clientX-last.x)/cam.z; cam.y += (e.clientY-last.y)/cam.z;
    last = {x:e.clientX, y:e.clientY}; }
  else { const n = pick(e.clientX,e.clientY);
    if (n){ tip.style.display="block";
      tip.style.left = Math.min(e.clientX+16, innerWidth-330)+"px"; tip.style.top = (e.clientY+14)+"px";
      tip.innerHTML = `<div class="k">${KINDLBL[n.type]}</div><div class="t">${n.label}</div>${n.meta||""}`; }
    else tip.style.display="none"; } });
addEventListener("pointerup", ()=>{ if (drag){ drag.pin = false; drag = null; }
  panning = false; last = null; cv.classList.remove("dragging"); });
cv.addEventListener("wheel", e=>{ e.preventDefault();
  const k = e.deltaY < 0 ? 1.1 : 1/1.1, z2 = Math.min(3.5, Math.max(0.35, cam.z*k));
  cam.z = z2; }, {passive:false});

// ---- loop ----
let prev = performance.now();
(function loop(now){ const dt = Math.min(0.05, (now-prev)/1000); prev = now;
  if (!W || !H) resize();               // some embedded webviews report 0×0 at script time
  step(dt); draw(); requestAnimationFrame(loop); })(prev);
</script>
</body>
</html>
